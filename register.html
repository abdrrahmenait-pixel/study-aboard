<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Study Abroad</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAV -->
    <nav>
        <a href="index.html" class="logo">Study Abroad</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="countries.html">Countries</a>
            <a href="favorites.html">Favorites</a>
            <a href="contact.html">Contact</a>
            <a href="login.html" class="btn">Login</a>
        </div>
    </nav>

    <!-- REGISTER FORM -->
    <div class="form-container">
        <h2>Create Account</h2>
        <p class="section-sub">Join us for free!</p>

        <form>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="your_name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Min. 6 characters">
            </div>
            <button type="submit" class="btn" style="width:100%">Create Account</button>
        </form>

        <p style="margin-top:20px; text-align:center; color:#64748B">
            Already have an account? <a href="login.html" style="color:#2563EB">Login here</a>
        </p>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2025 Study Abroad. All rights reserved.</p>
    </footer>

</body>
</html>
